<script>
    function getGiscusTheme() {
        var savedTheme = localStorage.getItem('theme');
        if (savedTheme) return savedTheme === 'dark' ? 'dark' : 'light';
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setGiscusTheme(theme) {
        var iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
            iframe.contentWindow.postMessage(
                { giscus: { setConfig: { theme: theme } } },
                'https://giscus.app'
            );
        }
    }

    // Load Giscus with correct initial theme
    var giscusScript = document.createElement('script');
    giscusScript.src = 'https://giscus.app/client.js';
    giscusScript.setAttribute('data-repo', 'Atekihcan/CLRS');
    giscusScript.setAttribute('data-repo-id', 'MDEwOlJlcG9zaXRvcnkzNTE2MzI4MQ==');
    giscusScript.setAttribute('data-category', 'Comments');
    giscusScript.setAttribute('data-category-id', 'DIC_kwDOAhiMkc4DAEhW');
    giscusScript.setAttribute('data-mapping', 'pathname');
    giscusScript.setAttribute('data-strict', '0');
    giscusScript.setAttribute('data-reactions-enabled', '1');
    giscusScript.setAttribute('data-emit-metadata', '0');
    giscusScript.setAttribute('data-input-position', 'top');
    giscusScript.setAttribute('data-theme', getGiscusTheme());
    giscusScript.setAttribute('data-lang', 'en');
    giscusScript.setAttribute('data-loading', 'lazy');
    giscusScript.setAttribute('crossorigin', 'anonymous');
    giscusScript.async = true;
    document.currentScript.parentElement.appendChild(giscusScript);

    // Sync theme when site toggle is clicked
    var toggle = document.getElementById('theme-toggle');
    if (toggle) {
        toggle.addEventListener('click', function() {
            setTimeout(function() { setGiscusTheme(getGiscusTheme()); }, 50);
        });
    }
</script>
