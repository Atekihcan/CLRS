"02/P02-01":
  - author: Stv Cl
    date: "Mar 10, 2023"
    body: "But, what will be the value of \\(k\\)?"
  - author: shadowReader
    date: "Oct 3, 2024"
    body: "The recursive equation for complexity is \\(T(n) = 2T(n/2) + \\Theta(n)\\) as it is for normal merge sort. But \\(T(k) = \\Theta(k^2)\\) since it is insertion sort. Solving this gives your required answer."

