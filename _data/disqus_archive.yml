    body: "Hi, sorry for my bad English. There is an error in <code>Iterative-Binary-Search</code>. <code>low</code> and <code>high</code> must be index, and not value."
  - author: Ovidiu Oprea
    date: "Jun 4, 2023"
    body: "Tried the recursive variant in Python and it doesn't return your value unless you set <code>return Recursive-Binary-Search(A, v, mid + 1, high)</code> and <code>return Recursive-Binary-Search(A, v, low, mid - 1)</code> in the elseif and else branches. Otherwise you get <code>None</code> or the return of your first run through the recursive function. The <code>return mid</code> is overridden."
  - author: Andrea Attardo
    date: "Oct 24, 2022"
    body: "I got it now. Thanks for clarifying."
  - author: Atekihcan
    date: "Oct 24, 2022"
    body: "We are comparing the middle element, and then checking half of rest of the elements in the array, which is \\((n - 1)/2\\), as you are taking out the middle element from the consideration, hence \\((n - 1)\\). But practically either way, worst case runtime is going to be \\(\\lg(n)\\). \\(n\\) or \\((n - 1)\\) is not going to make any difference there. Try taking a practical example, say an array with 1024 elements. If you consider \\(n/2\\), you'll reach down to 1 element in 10 steps. If you consider \\((n - 1)/2\\), same 10 steps will be required to reach down to 1 element, just that in every step, you'll have two arrays, but not of same size."

