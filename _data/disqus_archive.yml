"02/E02.03-03":
  - author: sverde
    date: "Jul 4, 2023"
    body: "I think that the fourth step in the formula is not correct: \\(2 \\cdot 2^k(\\lg 2^k + 1)\\). The correct way is \\(2 \\cdot 2^k(\\lg 2^k + 2)\\), isn't it?"
  - author: Pizzaboo
    date: "Sep 8, 2023"
    body: "No, the answer is correct."
  - author: sverde
    date: "Sep 8, 2023"
    body: >
      Yes, you're right. For the record:
      \\(= 2 \cdot 2^k \cdot \log(2^k) + 2 \cdot 2^k\\)
      \\(= 2^{k+1} \cdot \log(2^k) + 2^{k+1}\\)
      \\(= 2^{k+1}(\log(2^k) + 1)\\)
      \\(= 2^{k+1}(\log(2^k) + \log 2)\\)

