"05/E05.04-07":
  - author: Ilya
    date: "Nov 30, 2025"
    body: "I'm sorry, but the way you arrive at the upper bound is flawed. In particular, the very last inequality \\(n^{-1/2} < 1/n\\) is obviously false, since \\(n^{-1/2} = 1/\\sqrt{n}\\) which is asymptotically larger than \\(1/n\\). Also, the statement you're aiming to prove here is actually different from the original problem statement: you're trying to prove the upper bound for the event that no streak of length \\(s\\) occurs, while you should've been trying to prove the upper bound for the event that no streak of length \\(s+1\\) occurs. This is not to blame you or anything, just pointing out that, as of late 2025, it looks like there's still no correct solution to this hellish exercise, at least none that are available on the internet."
  - author: Atekihcan
    date: "May 28, 2026"
    body: "Thanks for your comment. I am not sure what was going through my mind when I wrote the previous solution haha. I have taken another shot at this hellspawn. And admittedly I needed some help from Claude to sharpen my final reasoning. Hope it holds now. Claude also pointed out a more rigorous proof, but I'm just leaving it as a note as I'm not really sure if that belongs here."
